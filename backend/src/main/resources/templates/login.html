<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion — ClinicApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            font-family: 'Inter', sans-serif;
        }
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #2563eb;
            margin: 0 0 4px;
        }
        .login-logo p {
            color: #64748b;
            font-size: 14px;
            margin: 0;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
        }
        .login-card .form-group { margin-bottom: 16px; }
        .login-card .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        .login-card .form-control {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color .15s;
        }
        .login-card .form-control:focus { border-color: #2563eb; }
        .btn-login {
            width: 100%;
            padding: 11px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-login:hover { background: #1d4ed8; }
        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="login-logo">
        <h1>ClinicApp</h1>
        <p>Système de gestion de clinique</p>
    </div>
    <div class="login-card">
        <div class="alert-error" th:if="${param.error}">
            Identifiant ou mot de passe incorrect.
        </div>
        <div class="alert-success" th:if="${param.logout}">
            Vous avez été déconnecté.
        </div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label class="form-label" for="username">Nom d'utilisateur</label>
                <input class="form-control" type="text" id="username" name="username"
                       placeholder="ex: dr.martin" autofocus required/>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Mot de passe</label>
                <input class="form-control" type="password" id="password" name="password"
                       placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn-login">Se connecter</button>
        </form>
    </div>
</div>
</body>
</html>
