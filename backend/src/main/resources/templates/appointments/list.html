<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Rendez-vous', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${success}" class="alert alert-info" th:text="${success}">OK</div>
<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<div class="panel">
    <div class="panel-header">
        <span>Agenda du jour</span>
        <div style="display:flex; gap:.5rem; align-items:center;">
            <a th:href="@{/appointments/week(date=${date},doctorId=${selectedDoctorId})}" class="btn btn-ghost btn-sm">Vue semaine</a>
            <a th:href="@{/appointments/new}" class="btn btn-primary btn-sm">+ Nouveau RDV</a>
        </div>
    </div>

    <!-- Barre de navigation date + filtre médecin -->
    <form method="get" th:action="@{/appointments}" class="search-bar" style="align-items:center;">
        <a th:href="@{/appointments(date=${prevDay},doctorId=${selectedDoctorId})}" class="btn btn-ghost btn-sm">← Veille</a>
        <input type="date" name="date" th:value="${date}" class="form-control" style="max-width:180px;"/>
        <a th:href="@{/appointments(date=${nextDay},doctorId=${selectedDoctorId})}" class="btn btn-ghost btn-sm">Lendemain →</a>
        <a th:href="@{/appointments(date=${today},doctorId=${selectedDoctorId})}" class="btn btn-ghost btn-sm">Aujourd'hui</a>

        <select name="doctorId" class="form-control" style="max-width:240px;" onchange="this.form.submit()">
            <option value="">— Tous les médecins —</option>
            <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.fullName}"
                    th:selected="${selectedDoctorId != null and selectedDoctorId == d.id}">Dr.</option>
        </select>
        <button type="submit" class="btn btn-primary btn-sm">Filtrer</button>
    </form>

    <div class="table-wrap">
        <table class="table">
            <thead>
            <tr>
                <th>Heure</th>
                <th>Patient</th>
                <th>Médecin</th>
                <th>Type</th>
                <th>Motif</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${appointments.isEmpty()}">
                <td colspan="7" class="empty-state">Aucun rendez-vous pour cette journée.</td>
            </tr>
            <tr th:each="a : ${appointments}">
                <td>
                    <strong th:text="${#temporals.format(a.startTime,'HH:mm')}">08:00</strong>
                    <span th:text="'– ' + ${#temporals.format(a.endTime,'HH:mm')}">– 08:30</span>
                </td>
                <td th:text="${a.patient != null ? a.patient.fullName : '—'}">Patient</td>
                <td th:text="${a.doctor != null ? a.doctor.fullName : '—'}">Médecin</td>
                <td th:text="${a.type ?: '—'}">CONSULTATION</td>
                <td th:text="${a.reason ?: '—'}">Motif</td>
                <td><span class="badge" th:classappend="'badge-' + ${a.status}" th:text="${a.status}">PLANIFIE</span></td>
                <td style="white-space:nowrap;">
                    <a th:href="@{/appointments/{id}/edit(id=${a.id})}" class="btn btn-ghost btn-sm">Modifier</a>
                    <form th:if="${a.status == 'PLANIFIE'}" method="post"
                          th:action="@{/appointments/{id}/confirm(id=${a.id})}" style="display:inline;">
                        <button class="btn btn-ghost btn-sm">Confirmer</button>
                    </form>
                    <form th:if="${a.status == 'PLANIFIE' or a.status == 'CONFIRME'}" method="post"
                          th:action="@{/appointments/{id}/start(id=${a.id})}" style="display:inline;">
                        <button class="btn btn-ghost btn-sm">Démarrer</button>
                    </form>
                    <form th:if="${a.status == 'EN_COURS'}" method="post"
                          th:action="@{/appointments/{id}/complete(id=${a.id})}" style="display:inline;">
                        <button class="btn btn-ghost btn-sm">Terminer</button>
                    </form>
                    <form th:if="${a.status == 'PLANIFIE' or a.status == 'CONFIRME'}" method="post"
                          th:action="@{/appointments/{id}/absent(id=${a.id})}" style="display:inline;">
                        <button class="btn btn-ghost btn-sm">Absent</button>
                    </form>
                    <form th:if="${a.status != 'ANNULE' and a.status != 'TERMINE'}" method="post"
                          th:action="@{/appointments/{id}/cancel(id=${a.id})}" style="display:inline;"
                          onsubmit="return confirm('Annuler ce rendez-vous ?');">
                        <button class="btn btn-ghost btn-sm">Annuler</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block></body>
</html>
