<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Consultation prénatale', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<div class="panel" style="margin-bottom:12px;">
    <div class="form-grid-2" style="padding:12px 16px;">
        <div><span class="detail-label">Patiente</span> <span th:text="${record.patientName}">—</span></div>
        <div><span class="detail-label">DPA</span>
             <span th:text="${record.expectedDueDate != null ? #temporals.format(record.expectedDueDate,'dd/MM/yyyy') : '—'}">—</span></div>
    </div>
</div>

<form method="post"
      th:action="${visit.id == null} ? @{/maternity/{id}/visits/new(id=${record.id})} : @{/maternity/{id}/visits/{vid}/edit(id=${record.id},vid=${visit.id})}"
      th:object="${visit}">
    <div class="form-card">
        <div class="panel-header"><span>Consultation prénatale (CPN)</span></div>

        <div class="form-grid-2">
            <div class="form-group">
                <label class="form-label">N° de CPN *</label>
                <input type="number" min="1" th:field="*{visitNumber}" class="form-control" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Date de la visite *</label>
                <input type="date" th:field="*{visitDate}" class="form-control" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Médecin / sage-femme</label>
                <select th:field="*{doctorId}" class="form-control">
                    <option value="">— Aucun —</option>
                    <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.fullName}">Dr.</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Âge gestationnel (SA)</label>
                <input type="number" min="0" max="45" th:field="*{gestationalAgeWeeks}" class="form-control"
                       placeholder="Calculé depuis la DDR si vide"/>
            </div>
            <div class="form-group">
                <label class="form-label">Poids (kg)</label>
                <input type="number" step="0.1" th:field="*{weightKg}" class="form-control"/>
            </div>
            <div class="form-group">
                <label class="form-label">Hauteur utérine (cm)</label>
                <input type="number" step="0.1" th:field="*{uterineHeightCm}" class="form-control"/>
            </div>
            <div class="form-group">
                <label class="form-label">Tension systolique (mmHg)</label>
                <input type="number" th:field="*{bpSystolic}" class="form-control" placeholder="ex: 120"/>
            </div>
            <div class="form-group">
                <label class="form-label">Tension diastolique (mmHg)</label>
                <input type="number" th:field="*{bpDiastolic}" class="form-control" placeholder="ex: 80"/>
            </div>
            <div class="form-group">
                <label class="form-label">Rythme cardiaque fœtal (bpm)</label>
                <input type="number" th:field="*{fetalHeartRate}" class="form-control" placeholder="ex: 140"/>
            </div>
            <div class="form-group">
                <label class="form-label">Présentation</label>
                <select th:field="*{presentation}" class="form-control">
                    <option value="">—</option>
                    <option value="CEPHALIQUE">Céphalique</option>
                    <option value="SIEGE">Siège</option>
                    <option value="TRANSVERSE">Transverse</option>
                </select>
            </div>
        </div>

        <div class="form-grid-2" style="margin-top:8px;">
            <label class="form-label" style="display:flex; align-items:center; gap:.5rem;">
                <input type="checkbox" th:field="*{edema}"/> Œdèmes
            </label>
            <label class="form-label" style="display:flex; align-items:center; gap:.5rem;">
                <input type="checkbox" th:field="*{proteinuria}"/> Protéinurie positive
            </label>
            <label class="form-label" style="display:flex; align-items:center; gap:.5rem;">
                <input type="checkbox" th:field="*{ironSupplemented}"/> Supplémentation fer / acide folique
            </label>
            <label class="form-label" style="display:flex; align-items:center; gap:.5rem;">
                <input type="checkbox" th:field="*{ttvVaccine}"/> Vaccin antitétanique (VAT)
            </label>
        </div>

        <div class="form-group" style="margin-top:8px;">
            <label class="form-label">Observations</label>
            <textarea th:field="*{observations}" class="form-control" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Recommandations</label>
            <textarea th:field="*{recommendations}" class="form-control" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Date de la prochaine visite</label>
            <input type="date" th:field="*{nextVisitDate}" class="form-control"/>
        </div>

        <div style="display:flex; gap:.5rem; margin-top:12px;">
            <button type="submit" class="btn btn-primary">Enregistrer la CPN</button>
            <a th:href="@{/maternity/{id}(id=${record.id})}" class="btn btn-ghost">Annuler</a>
        </div>
    </div>
</form>

</th:block></body>
</html>
