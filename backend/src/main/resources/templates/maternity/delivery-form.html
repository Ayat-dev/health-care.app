<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Enregistrer l’accouchement', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<div class="panel" style="margin-bottom:12px;">
    <div class="form-grid-2" style="padding:12px 16px;">
        <div><span class="detail-label">Patiente</span> <span th:text="${record.patientName}">—</span></div>
        <div><span class="detail-label">DPA</span>
             <span th:text="${record.expectedDueDate != null ? #temporals.format(record.expectedDueDate,'dd/MM/yyyy') : '—'}">—</span></div>
    </div>
</div>

<form method="post" th:action="@{/maternity/{id}/delivery(id=${record.id})}" th:object="${record}">
    <div class="form-card">
        <div class="panel-header"><span>Accouchement</span></div>

        <div class="form-grid-2">
            <div class="form-group">
                <label class="form-label">Date d'accouchement *</label>
                <input type="date" th:field="*{deliveryDate}" class="form-control" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Type d'accouchement</label>
                <select th:field="*{deliveryType}" class="form-control">
                    <option value="">—</option>
                    <option value="NATUREL">Naturel (voie basse)</option>
                    <option value="CESARIENNE">Césarienne</option>
                    <option value="FORCEPS">Forceps / instrumental</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Issue</label>
                <select th:field="*{deliveryOutcome}" class="form-control">
                    <option value="">—</option>
                    <option value="VIVANT">Né vivant</option>
                    <option value="MORT_NE">Mort-né</option>
                    <option value="AVORTEMENT">Avortement</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Sexe du nouveau-né</label>
                <select th:field="*{newbornGender}" class="form-control">
                    <option value="">—</option>
                    <option value="M">Masculin</option>
                    <option value="F">Féminin</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Poids de naissance (g)</label>
                <input type="number" min="0" th:field="*{newbornWeightG}" class="form-control" placeholder="ex: 3200"/>
            </div>
            <div class="form-group">
                <label class="form-label">Apgar à 1 min (/10)</label>
                <input type="number" min="0" max="10" th:field="*{newbornApgar1}" class="form-control"/>
            </div>
            <div class="form-group">
                <label class="form-label">Apgar à 5 min (/10)</label>
                <input type="number" min="0" max="10" th:field="*{newbornApgar5}" class="form-control"/>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Complications</label>
            <textarea th:field="*{complications}" class="form-control" rows="2"
                      placeholder="Hémorragie, déchirure, réanimation néonatale…"></textarea>
        </div>

        <div style="display:flex; gap:.5rem; margin-top:12px;">
            <button type="submit" class="btn btn-primary">Enregistrer l'accouchement</button>
            <a th:href="@{/maternity/{id}(id=${record.id})}" class="btn btn-ghost">Annuler</a>
        </div>
    </div>
</form>

</th:block></body>
</html>
