<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Maternité', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${success}" class="alert alert-success" th:text="${success}">OK</div>
<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<div class="panel">
    <div class="panel-header">
        <span>Dossiers de grossesse</span>
        <a th:href="@{/maternity/new}" class="btn btn-primary btn-sm">+ Ouvrir un dossier</a>
    </div>

    <form method="get" th:action="@{/maternity}" style="display:flex; gap:.5rem; padding:12px 16px; align-items:flex-end;">
        <div class="form-group" style="margin:0;">
            <label class="form-label">Statut</label>
            <select name="status" class="form-control" onchange="this.form.submit()">
                <option value="">Tous</option>
                <option value="EN_COURS"  th:selected="${status == 'EN_COURS'}">En cours</option>
                <option value="ACCOUCHEE" th:selected="${status == 'ACCOUCHEE'}">Accouchée</option>
                <option value="CLOTURE"   th:selected="${status == 'CLOTURE'}">Clôturé</option>
            </select>
        </div>
    </form>

    <div class="table-wrap">
        <table class="table">
            <thead>
            <tr><th>Patiente</th><th>Dossier</th><th>Suivi par</th><th>DPA</th><th>Âge gest.</th><th>Statut</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:if="${records.isEmpty()}">
                <td colspan="7" class="empty-state">Aucun dossier maternité.</td>
            </tr>
            <tr th:each="r : ${records}">
                <td><strong th:text="${r.patientName}">Patiente</strong></td>
                <td><span class="badge badge-blue" th:text="${r.patientRecordNumber}">PAT-…</span></td>
                <td th:text="${r.doctorName ?: '—'}">—</td>
                <td th:text="${r.expectedDueDate != null ? #temporals.format(r.expectedDueDate,'dd/MM/yyyy') : '—'}">—</td>
                <td th:text="${r.currentGestationalAgeWeeks != null ? r.currentGestationalAgeWeeks + ' SA' : '—'}">—</td>
                <td><span class="badge" th:classappend="'badge-' + ${r.status}" th:text="${r.status}">EN_COURS</span></td>
                <td><a th:href="@{/maternity/{id}(id=${r.id})}" class="btn btn-ghost btn-sm">Voir</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block></body>
</html>
