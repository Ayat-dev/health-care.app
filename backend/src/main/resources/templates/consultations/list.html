<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Consultations', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${success}" class="alert alert-info" th:text="${success}">OK</div>
<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<div class="panel">
    <div class="panel-header">
        <span>Consultations</span>
        <a th:href="@{/consultations/new}" class="btn btn-primary btn-sm">+ Nouvelle consultation</a>
    </div>

    <form method="get" th:action="@{/consultations}" class="search-bar" style="align-items:center;">
        <input type="date" name="from" th:value="${from}" class="form-control" style="max-width:170px;"/>
        <span>→</span>
        <input type="date" name="to" th:value="${to}" class="form-control" style="max-width:170px;"/>
        <select name="doctorId" class="form-control" style="max-width:240px;">
            <option value="">— Tous les médecins —</option>
            <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.fullName}"
                    th:selected="${selectedDoctorId != null and selectedDoctorId == d.id}">Dr.</option>
        </select>
        <select name="status" class="form-control" style="max-width:170px;">
            <option value="">— Tous statuts —</option>
            <option value="EN_COURS" th:selected="${status == 'EN_COURS'}">En cours</option>
            <option value="TERMINE" th:selected="${status == 'TERMINE'}">Terminé</option>
            <option value="ANNULE" th:selected="${status == 'ANNULE'}">Annulé</option>
        </select>
        <button type="submit" class="btn btn-primary btn-sm">Filtrer</button>
    </form>

    <div class="table-wrap">
        <table class="table">
            <thead>
            <tr>
                <th>Date</th>
                <th>Patient</th>
                <th>Médecin</th>
                <th>Motif</th>
                <th>Diagnostic</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${consultations.isEmpty()}">
                <td colspan="7" class="empty-state">Aucune consultation.</td>
            </tr>
            <tr th:each="c : ${consultations}">
                <td><strong th:text="${#temporals.format(c.consultationDate,'dd/MM/yyyy HH:mm')}">01/01 09:00</strong></td>
                <td th:text="${c.patient != null ? c.patient.fullName : '—'}">Patient</td>
                <td th:text="${c.doctor != null ? c.doctor.fullName : '—'}">Médecin</td>
                <td th:text="${c.chiefComplaint ?: '—'}">Motif</td>
                <td th:text="${c.diagnosis ?: '—'}">Diagnostic</td>
                <td><span class="badge" th:classappend="'badge-' + ${c.status}" th:text="${c.status}">EN_COURS</span></td>
                <td style="white-space:nowrap;">
                    <a th:href="@{/consultations/{id}(id=${c.id})}" class="btn btn-ghost btn-sm">Voir</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block></body>
</html>
