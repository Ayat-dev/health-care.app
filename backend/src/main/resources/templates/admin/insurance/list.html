<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Assureurs', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<div class="panel">
    <div class="panel-header">
        <span>Assureurs &amp; mutuelles</span>
        <a th:href="@{/admin/insurance/new}" class="btn btn-primary btn-sm">+ Nouvel assureur</a>
    </div>

    <div class="table-wrap">
        <table class="table">
            <thead>
            <tr>
                <th>Code</th>
                <th>Nom</th>
                <th>Type</th>
                <th>Prise en charge</th>
                <th>Contact</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${providers.isEmpty()}">
                <td colspan="7" class="empty-state">Aucun assureur.</td>
            </tr>
            <tr th:each="p : ${providers}">
                <td><code th:text="${p.code != null ? p.code : '—'}">IPM</code></td>
                <td th:text="${p.name}">IPM</td>
                <td th:text="${p.type != null ? p.type : '—'}">PUBLIQUE</td>
                <td th:text="${p.coveragePercent != null ? p.coveragePercent + ' %' : '—'}">80 %</td>
                <td th:text="${p.contact != null ? p.contact : '—'}">—</td>
                <td>
                    <span th:if="${p.active}" class="badge badge-green">Actif</span>
                    <span th:unless="${p.active}" class="badge badge-red">Désactivé</span>
                </td>
                <td>
                    <a th:href="@{/admin/insurance/{id}/edit(id=${p.id})}" class="btn btn-ghost btn-sm">Modifier</a>
                    <form th:action="@{/admin/insurance/{id}/toggle(id=${p.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-ghost btn-sm"
                                th:text="${p.active ? 'Désactiver' : 'Activer'}">Désactiver</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block></body>
</html>
