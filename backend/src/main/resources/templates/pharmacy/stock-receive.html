<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Réception de stock', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<div class="form-card">
    <form th:action="@{/pharmacy/stock/receive}" method="post">

        <div class="form-grid-2">
            <div class="form-group">
                <label class="form-label">Médicament *</label>
                <select name="drugId" class="form-control" required>
                    <option value="">— Choisir un médicament —</option>
                    <option th:each="d : ${drugs}" th:value="${d.id}"
                            th:text="${d.name + (d.dosageStrength != null ? ' ' + d.dosageStrength : '')}"
                            th:selected="${item.drugId == d.id}">Médicament</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Numéro de lot</label>
                <input type="text" name="batchNumber" th:value="${item.batchNumber}"
                       class="form-control" placeholder="LOT-2026-ABC"/>
            </div>
            <div class="form-group">
                <label class="form-label">Date de péremption *</label>
                <input type="date" name="expiryDate" th:value="${item.expiryDate}"
                       class="form-control" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Quantité reçue *</label>
                <input type="number" name="quantity" th:value="${item.quantity}"
                       class="form-control" min="1" step="1" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Seuil d'alerte</label>
                <input type="number" name="quantityAlert" th:value="${item.quantityAlert}"
                       class="form-control" min="0" step="1" placeholder="10"/>
            </div>
            <div class="form-group">
                <label class="form-label">Prix d'achat</label>
                <input type="number" name="purchasePrice" th:value="${item.purchasePrice}"
                       class="form-control" min="0" step="0.01"/>
            </div>
            <div class="form-group">
                <label class="form-label">Prix de vente *</label>
                <input type="number" name="sellingPrice" th:value="${item.sellingPrice}"
                       class="form-control" min="0" step="0.01" required/>
            </div>
            <div class="form-group">
                <label class="form-label">Fournisseur</label>
                <input type="text" name="supplier" th:value="${item.supplier}"
                       class="form-control" placeholder="Laborex"/>
            </div>
            <div class="form-group">
                <label class="form-label">Date de réception</label>
                <input type="date" name="receivedAt" th:value="${item.receivedAt}" class="form-control"/>
            </div>
        </div>

        <div class="form-actions">
            <a th:href="@{/pharmacy/stock}" class="btn btn-ghost">Annuler</a>
            <button type="submit" class="btn btn-primary">Réceptionner le lot</button>
        </div>
    </form>
</div>

</th:block></body>
</html>
