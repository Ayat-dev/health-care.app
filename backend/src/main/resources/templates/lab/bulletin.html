<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <title th:text="'Bulletin ' + ${request.requestNumber}">Bulletin de résultats</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: "Segoe UI", Arial, sans-serif; color: #0f172a; margin: 0; padding: 24px; background: #f1f5f9; }
        .sheet { max-width: 800px; margin: 0 auto; background: #fff; padding: 32px 40px; border: 1px solid #e2e8f0; }
        .lab-header { display: flex; justify-content: space-between; align-items: flex-start;
                      border-bottom: 2px solid #0f172a; padding-bottom: 12px; }
        .clinic-name { font-size: 22px; font-weight: 700; }
        .clinic-meta { font-size: 12px; color: #475569; line-height: 1.5; }
        .logo { max-height: 64px; }
        .lab-row { display: flex; justify-content: space-between; gap: 24px; margin-top: 16px; font-size: 14px; }
        .lab-block { line-height: 1.6; }
        .lab-label { color: #64748b; font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
        .lab-title { font-size: 16px; font-weight: 700; margin: 24px 0 6px; color: #1e293b;
                     border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; color: #64748b; font-size: 11px; text-transform: uppercase; padding: 6px 8px; }
        td { padding: 6px 8px; border-top: 1px solid #f1f5f9; }
        .abn { color: #b91c1c; font-weight: 700; }
        .flag { color: #b91c1c; }
        .ok { color: #15803d; }
        .lab-footer { margin-top: 40px; display: flex; justify-content: space-between; align-items: flex-end;
                      font-size: 12px; color: #475569; }
        .signature .line { width: 220px; border-top: 1px solid #94a3b8; margin-top: 48px; padding-top: 4px; text-align: center; }
        .toolbar { max-width: 800px; margin: 0 auto 16px; text-align: right; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
               font-size: 13px; text-decoration: none; }
        .btn-print { background: #2563eb; color: #fff; }
        .btn-back { background: #e2e8f0; color: #0f172a; margin-right: 8px; }
        @media print {
            body { background: #fff; padding: 0; }
            .sheet { border: none; max-width: none; }
            .toolbar { display: none; }
        }
    </style>
</head>
<body>

<div class="toolbar">
    <a href="javascript:history.back()" class="btn btn-back">← Retour</a>
    <button onclick="window.print()" class="btn btn-print">Imprimer</button>
</div>

<div class="sheet">
    <div class="lab-header">
        <div>
            <div class="clinic-name" th:text="'Laboratoire — ' + ${config.name}">Laboratoire</div>
            <div class="clinic-meta">
                <div th:if="${config.address}" th:text="${config.address}">Adresse</div>
                <div>
                    <span th:if="${config.phone}" th:text="'Tél : ' + ${config.phone}">Tél</span>
                    <span th:if="${config.email}" th:text="' · ' + ${config.email}">Email</span>
                </div>
            </div>
        </div>
        <img th:if="${config.logoUrl}" th:src="${config.logoUrl}" class="logo" alt="Logo"/>
    </div>

    <div class="lab-row">
        <div class="lab-block">
            <div class="lab-label">Patient</div>
            <div th:text="${request.patientName}">NOM Prénom</div>
            <div class="clinic-meta" th:text="'N° dossier : ' + ${request.patientRecordNumber}">N° dossier</div>
        </div>
        <div class="lab-block" style="text-align:right;">
            <div class="lab-label">N° / Date</div>
            <div th:text="${request.requestNumber}">LAB-…</div>
            <div class="clinic-meta" th:text="${#temporals.format(request.requestedAt,'dd/MM/yyyy')}">01/01/2026</div>
            <div class="clinic-meta" th:text="${patientAge != null ? 'Âge : ' + patientAge + ' ans' : ''}"></div>
        </div>
    </div>

    <div class="lab-row" style="border-top:1px solid #e2e8f0; padding-top:12px;">
        <div class="lab-block">
            <div class="lab-label">Prescripteur</div>
            <div th:text="${request.doctorName ?: '—'}">Dr.</div>
        </div>
    </div>

    <div class="lab-title">Résultats</div>
    <table>
        <thead>
        <tr><th>Analyse</th><th>Résultat</th><th>Valeurs de référence</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="it : ${request.items}">
            <td th:text="${it.testName}">Hémoglobine</td>
            <td th:classappend="${it.abnormal} ? 'abn'"
                th:text="${(it.resultValue ?: '—')} + (${it.unit != null} ? ' ' + ${it.unit} : '')">12.5 g/dL</td>
            <td th:text="${it.referenceRange ?: (it.catalogReferenceRange ?: '—')}">[13-17]</td>
            <td><span th:if="${it.resultValue != null}" th:classappend="${it.abnormal} ? 'flag' : 'ok'"
                      th:text="${it.abnormal} ? '⚠ Anormal' : '✓'">✓</span></td>
        </tr>
        </tbody>
    </table>

    <div class="lab-footer">
        <div th:text="'Bulletin ' + ${request.requestNumber}">Bulletin</div>
        <div class="signature">
            <div class="line">
                <span th:if="${request.items != null and !request.items.isEmpty() and request.items[0].validatedByName != null}"
                      th:text="'Validé par ' + ${request.items[0].validatedByName}">Validé par</span>
                <span th:unless="${request.items != null and !request.items.isEmpty() and request.items[0].validatedByName != null}">
                    Signature / Cachet</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
