<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Facture', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<div class="form-card">
    <div class="panel-header" style="padding:0 0 12px;">
        <span th:text="${invoice.id != null} ? 'Modifier la facture ' + ${invoice.invoiceNumber} : 'Nouvelle facture'">Nouvelle facture</span>
    </div>

    <form th:action="${invoice.id != null} ? @{/billing/invoices/{id}/edit(id=${invoice.id})} : @{/billing/invoices/new}"
          method="post">

        <div class="form-grid-2">
            <div class="form-group">
                <label class="form-label">Patient *</label>
                <select name="patientId" class="form-control" required>
                    <option value="">— Sélectionner —</option>
                    <option th:each="p : ${patients}" th:value="${p.id}"
                            th:selected="${invoice.patientId == p.id}"
                            th:text="${p.fullName} + ' (' + ${p.recordNumber} + ')'">Patient</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Échéance</label>
                <input type="date" name="dueDate" class="form-control"
                       th:value="${invoice.dueDate != null ? #temporals.format(invoice.dueDate,'yyyy-MM-dd') : ''}"/>
            </div>
            <div class="form-group">
                <label class="form-label">Assurance</label>
                <select name="insuranceId" class="form-control" id="insuranceSelect">
                    <option value="">— Aucune (payant comptant) —</option>
                    <option th:each="ins : ${insurers}" th:value="${ins.id}"
                            th:selected="${invoice.insuranceId == ins.id}"
                            th:attr="data-coverage=${ins.coveragePercent}"
                            th:text="${ins.name}">Assureur</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Taux de couverture (%)</label>
                <input type="number" step="0.01" min="0" max="100" name="insuranceCoveragePercent"
                       id="coverageInput" class="form-control"
                       th:value="${invoice.insuranceCoveragePercent}"/>
            </div>
        </div>

        <input type="hidden" name="consultationId" th:value="${invoice.consultationId}"/>
        <input type="hidden" name="hospitalizationId" th:value="${invoice.hospitalizationId}"/>

        <h3 class="form-section-title" style="margin-top:8px;">Lignes de facturation</h3>
        <div class="table-wrap">
            <table class="table" id="inv-table">
                <thead>
                <tr>
                    <th style="width:24%;">Acte (catalogue)</th>
                    <th>Désignation *</th>
                    <th style="width:80px;">Qté</th>
                    <th style="width:150px;">Prix unitaire</th>
                </tr>
                </thead>
                <tbody id="inv-body">
                <tr th:each="it,stat : ${invoice.items}">
                    <td>
                        <select class="form-control act-select" th:name="'items[' + ${stat.index} + '].actId'"
                                th:attr="onchange='fillAct(this)'">
                            <option value="">— Libre —</option>
                            <option th:each="a : ${acts}" th:value="${a.id}"
                                    th:selected="${it.actId == a.id}"
                                    th:attr="data-name=${a.name},data-price=${a.price}"
                                    th:text="${a.code} + ' — ' + ${a.name}">Acte</option>
                        </select>
                    </td>
                    <td><input type="text" class="form-control" th:name="'items[' + ${stat.index} + '].description'" th:value="${it.description}"/></td>
                    <td><input type="number" min="1" class="form-control" th:name="'items[' + ${stat.index} + '].quantity'" th:value="${it.quantity > 0 ? it.quantity : 1}"/></td>
                    <td><input type="number" step="0.01" min="0" class="form-control" th:name="'items[' + ${stat.index} + '].unitPrice'" th:value="${it.unitPrice}"/></td>
                </tr>
                </tbody>
            </table>
        </div>
        <button type="button" class="btn btn-ghost btn-sm" onclick="addInvRow()">+ Ajouter une ligne</button>

        <div class="form-group" style="margin-top:12px;">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="2" th:text="${invoice.notes}"></textarea>
        </div>

        <div class="form-actions">
            <a th:href="${invoice.id != null} ? @{/billing/invoices/{id}(id=${invoice.id})} : @{/billing/invoices}"
               class="btn btn-ghost">Annuler</a>
            <button type="submit" class="btn btn-primary">Enregistrer la facture</button>
        </div>
    </form>
</div>

<script th:inline="javascript">
let invIndex = /*[[${invoice.items.size()}]]*/ 1;
const acts = /*[[${acts}]]*/ [];

function actOptions() {
    let html = '<option value="">— Libre —</option>';
    acts.forEach(a => {
        html += '<option value="' + a.id + '" data-name="' + a.name.replace(/"/g,'&quot;')
              + '" data-price="' + a.price + '">' + a.code + ' — ' + a.name + '</option>';
    });
    return html;
}

function fillAct(select) {
    const opt = select.options[select.selectedIndex];
    if (!opt || !opt.value) return;
    const row = select.closest('tr');
    const desc = row.querySelector('input[name$=".description"]');
    const price = row.querySelector('input[name$=".unitPrice"]');
    if (desc && !desc.value) desc.value = opt.getAttribute('data-name') || '';
    if (price && (!price.value || price.value === '0')) price.value = opt.getAttribute('data-price') || '';
}

function addInvRow() {
    const body = document.getElementById('inv-body');
    const i = invIndex++;
    const tr = document.createElement('tr');
    tr.innerHTML =
        '<td><select class="form-control act-select" name="items[' + i + '].actId" onchange="fillAct(this)">' + actOptions() + '</select></td>' +
        '<td><input type="text" class="form-control" name="items[' + i + '].description"></td>' +
        '<td><input type="number" min="1" class="form-control" name="items[' + i + '].quantity" value="1"></td>' +
        '<td><input type="number" step="0.01" min="0" class="form-control" name="items[' + i + '].unitPrice"></td>';
    body.appendChild(tr);
}

// Pré-remplit le taux de couverture quand on choisit un assureur (si vide).
document.getElementById('insuranceSelect').addEventListener('change', function () {
    const opt = this.options[this.selectedIndex];
    const cov = opt ? opt.getAttribute('data-coverage') : null;
    const input = document.getElementById('coverageInput');
    if (cov && (!input.value || input.value === '0')) input.value = cov;
    if (!this.value) input.value = 0;
});
</script>

</th:block></body>
</html>
