<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Facturation — Factures', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${success}" class="alert alert-success" th:text="${success}">OK</div>
<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<div class="panel">
    <div class="panel-header">
        <span>Factures</span>
        <div style="display:flex; gap:.5rem;">
            <a th:href="@{/billing/dashboard}" class="btn btn-ghost btn-sm">Tableau de bord</a>
            <a th:href="@{/billing/invoices/new}" class="btn btn-primary btn-sm">+ Nouvelle facture</a>
        </div>
    </div>

    <form method="get" th:action="@{/billing/invoices}" class="search-bar" style="align-items:center;">
        <input type="date" name="from" th:value="${from}" class="form-control" style="max-width:170px;"/>
        <span>→</span>
        <input type="date" name="to" th:value="${to}" class="form-control" style="max-width:170px;"/>
        <select name="status" class="form-control" style="max-width:180px;">
            <option value="">— Tous statuts —</option>
            <option value="EN_ATTENTE" th:selected="${status == 'EN_ATTENTE'}">En attente</option>
            <option value="PARTIEL" th:selected="${status == 'PARTIEL'}">Partiel</option>
            <option value="PAYE" th:selected="${status == 'PAYE'}">Payée</option>
            <option value="ANNULE" th:selected="${status == 'ANNULE'}">Annulée</option>
        </select>
        <button type="submit" class="btn btn-primary btn-sm">Filtrer</button>
    </form>

    <div class="table-wrap">
        <table class="table">
            <thead>
            <tr>
                <th>N°</th>
                <th>Patient</th>
                <th>Date</th>
                <th style="text-align:right;">Total</th>
                <th style="text-align:right;">Part patient</th>
                <th style="text-align:right;">Payé</th>
                <th style="text-align:right;">Reste</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${invoices.isEmpty()}">
                <td colspan="9" class="empty-state">Aucune facture.</td>
            </tr>
            <tr th:each="inv : ${invoices}">
                <td><strong th:text="${inv.invoiceNumber}">FAC-…</strong></td>
                <td>
                    <span th:text="${inv.patientName}">Patient</span>
                    <small th:text="${inv.patientRecordNumber}">PAT-…</small>
                </td>
                <td th:text="${#temporals.format(inv.createdAt,'dd/MM/yyyy')}">01/01</td>
                <td style="text-align:right;" th:text="${#numbers.formatDecimal(inv.subtotal,1,'WHITESPACE',0,'POINT')}">0</td>
                <td style="text-align:right;" th:text="${#numbers.formatDecimal(inv.patientAmount,1,'WHITESPACE',0,'POINT')}">0</td>
                <td style="text-align:right;" th:text="${#numbers.formatDecimal(inv.paidAmount,1,'WHITESPACE',0,'POINT')}">0</td>
                <td style="text-align:right;">
                    <strong th:style="${inv.balanceDue.signum() > 0} ? 'color:#b91c1c'"
                            th:text="${#numbers.formatDecimal(inv.balanceDue,1,'WHITESPACE',0,'POINT')}">0</strong>
                </td>
                <td><span class="badge" th:classappend="'badge-' + ${inv.status}" th:text="${inv.status}">EN_ATTENTE</span></td>
                <td style="white-space:nowrap;">
                    <a th:href="@{/billing/invoices/{id}(id=${inv.id})}" class="btn btn-ghost btn-sm">Voir</a>
                    <a th:if="${inv.status == 'EN_ATTENTE' or inv.status == 'PARTIEL'}"
                       th:href="@{/billing/invoices/{id}/pay(id=${inv.id})}" class="btn btn-primary btn-sm">Encaisser</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block></body>
</html>
