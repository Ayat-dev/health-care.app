<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Nouvelle demande d’imagerie', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<form method="post" th:action="@{/radiology/requests/new}" th:object="${request}">
    <div class="form-card">
        <div class="panel-header"><span>Demande d'imagerie</span></div>

        <div class="form-grid-2">
            <div class="form-group">
                <label class="form-label">Patient *</label>
                <select th:field="*{patientId}" class="form-control" required>
                    <option value="">— Choisir un patient —</option>
                    <option th:each="p : ${patients}" th:value="${p.id}"
                            th:text="${p.fullName} + ' (' + ${p.recordNumber} + ')'">Patient</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Médecin prescripteur *</label>
                <select th:field="*{doctorId}" class="form-control" required>
                    <option value="">— Choisir un médecin —</option>
                    <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.fullName}">Dr.</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Priorité</label>
                <select th:field="*{priority}" class="form-control">
                    <option value="NORMAL">Normal</option>
                    <option value="URGENT">Urgent</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Renseignements cliniques</label>
                <input type="text" th:field="*{clinicalInfo}" class="form-control" placeholder="Indication clinique…"/>
            </div>
        </div>

        <input type="hidden" th:field="*{consultationId}"/>

        <div class="form-group">
            <label class="form-label">Examens demandés *</label>
            <div class="table-wrap">
                <table class="table">
                    <thead>
                    <tr><th style="width:48px;"></th><th>Code</th><th>Examen</th><th>Type</th><th>Région</th><th>Tarif</th></tr>
                    </thead>
                    <tbody>
                    <tr th:if="${exams.isEmpty()}">
                        <td colspan="6" class="empty-state">Aucun examen au catalogue.</td>
                    </tr>
                    <tr th:each="e : ${exams}">
                        <td style="text-align:center;">
                            <input type="checkbox" name="examIds" th:value="${e.id}"
                                   th:checked="${request.examIds != null and #lists.contains(request.examIds, e.id)}"/>
                        </td>
                        <td><strong th:text="${e.code}">RX_THORAX</strong></td>
                        <td th:text="${e.name}">Radiographie du thorax</td>
                        <td><span class="badge" th:text="${e.type ?: '—'}">RADIOGRAPHIE</span></td>
                        <td th:text="${e.region ?: '—'}">Thorax</td>
                        <td th:text="${#numbers.formatDecimal(e.price,1,'WHITESPACE',0,'POINT')} + ' F'">8 000 F</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div style="display:flex; gap:.5rem; margin-top:12px;">
            <button type="submit" class="btn btn-primary">Enregistrer la demande</button>
            <a th:href="@{/radiology}" class="btn btn-ghost">Annuler</a>
        </div>
    </div>
</form>

</th:block></body>
</html>
