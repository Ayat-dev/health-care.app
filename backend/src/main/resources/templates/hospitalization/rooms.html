<!DOCTYPE html>
<html th:replace="~{layouts/base :: layout('Chambres & lits', ~{::content})}">
<body><th:block th:fragment="content">

<div th:if="${success}" class="alert alert-success" th:text="${success}">OK</div>
<div th:if="${error}" class="alert alert-error" th:text="${error}">Erreur</div>

<div class="panel">
    <div class="panel-header">
        <span>Chambres &amp; lits</span>
        <div style="display:flex; gap:.5rem;">
            <a th:href="@{/hospitalization}" class="btn btn-ghost btn-sm">Plan des lits</a>
            <a th:href="@{/hospitalization/rooms/new}" class="btn btn-primary btn-sm">+ Nouvelle chambre</a>
        </div>
    </div>

    <div class="table-wrap">
        <table class="table">
            <thead>
            <tr>
                <th>N°</th>
                <th>Service</th>
                <th>Type</th>
                <th>Capacité</th>
                <th>Tarif / nuit</th>
                <th>Statut</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${rooms.isEmpty()}">
                <td colspan="7" class="empty-state">Aucune chambre.</td>
            </tr>
            <tr th:each="r : ${rooms}">
                <td><strong th:text="${r.roomNumber}">101</strong></td>
                <td th:text="${r.departmentName ?: '—'}">Service</td>
                <td><span class="badge" th:text="${r.type}">STANDARD</span></td>
                <td th:text="${r.capacity} + ' lit(s)'">1 lit(s)</td>
                <td th:text="${#numbers.formatDecimal(r.dailyRate,1,'WHITESPACE',0,'POINT')} + ' F'">15 000 F</td>
                <td>
                    <span th:if="${r.active}" class="badge badge-green">Active</span>
                    <span th:unless="${r.active}" class="badge badge-red">Désactivée</span>
                </td>
                <td style="white-space:nowrap;">
                    <a th:href="@{/hospitalization/rooms/{id}/edit(id=${r.id})}" class="btn btn-ghost btn-sm">Modifier</a>
                    <form th:action="@{/hospitalization/rooms/{id}/toggle(id=${r.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-ghost btn-sm"
                                th:text="${r.active ? 'Désactiver' : 'Activer'}">Désactiver</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</th:block></body>
</html>
