# Serveur
server.port=8080

# Base de données H2 (dev)
spring.datasource.url=jdbc:h2:mem:clinicdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Schema is owned by Flyway; Hibernate only validates entities against it.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=clinicapp-secret-key-change-in-production-min32chars!!
app.jwt.expiration-ms=86400000

# Logs
spring.jpa.show-sql=false
